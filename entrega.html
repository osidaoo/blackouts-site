<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Entrega Blackouts</title>
  <style>
    :root{
      --bg:#02040a;
      --bg2:#07111f;
      --panel:rgba(10,16,30,.92);
      --line:rgba(111,168,255,.18);
      --text:#f5f7ff;
      --muted:#aab5d6;
      --primary:#4ea1ff;
      --primary2:#7cc0ff;
      --ok:#3ddc97;
      --warn:#ffb84d;
      --danger:#ff5f7a;
      --radius:20px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(78,161,255,.15), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color:var(--text);
      padding:24px;
    }

    .container{
      max-width:720px;
      margin:0 auto;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:24px;
      margin-top:30px;
    }

    .logo{
      font-size:30px;
      font-weight:900;
      letter-spacing:2px;
      color:var(--primary2);
      margin-bottom:10px;
    }


    .subtitle{
      color:var(--muted);
      margin-bottom:20px;
    }

    .status{
      padding:14px 16px;
      border-radius:14px;
      margin-top:14px;
      white-space:pre-wrap;
    }

    .ok{
      background:rgba(61,220,151,.1);
      color:#bdf5dc;
      border:1px solid rgba(61,220,151,.2);
    }

    .warn{
      background:rgba(255,184,77,.12);
      color:#ffe1b3;
      border:1px solid rgba(255,184,77,.2);
    }

    .error{
      background:rgba(255,95,122,.1);
      color:#ffd6de;
      border:1px solid rgba(255,95,122,.2);
    }

    .entrega-box{
      margin-top:18px;
      padding:18px;
      border-radius:16px;
      background:rgba(61,220,151,.08);
      border:1px solid rgba(61,220,151,.18);
    }

    .label{
      color:var(--muted);
      font-size:13px;
      margin-top:12px;
      margin-bottom:6px;
    }

    .value{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:14px;
      word-break:break-word;
    }

    .btn{
      margin-top:18px;
      border:none;
      border-radius:14px;
      padding:14px 18px;
      cursor:pointer;
      font-weight:700;
      background:linear-gradient(135deg, var(--primary), var(--primary2));
      color:#00152f;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">BLACKOUTS</div>
      <div class="subtitle">Consulta automática da entrega</div>

      <div id="statusArea" class="status warn">Consultando seu pedido...</div>

      <div id="entregaArea" style="display:none;">
        <div class="entrega-box">
          <strong>Conta liberada com sucesso</strong>

          <div class="label">Produto</div>
          <div class="value" id="produtoNome"></div>

          <div class="label">Login</div>
          <div class="value" id="loginConta"></div>

          <div class="label">Senha</div>
          <div class="value" id="senhaConta"></div>
        </div>
      </div>

      <button class="btn" onclick="consultarPedido()">Atualizar status</button>
    </div>
  </div>

  <script>
    const API_URL = "https://blackouts-site.onrender.com"

    function getParam(nome) {
      const url = new URL(window.location.href)
      return url.searchParams.get(nome)
    }

    async function consultarPedido() {
      const pedido = getParam("pedido")
      const email = getParam("email")

      const statusArea = document.getElementById("statusArea")
      const entregaArea = document.getElementById("entregaArea")

      entregaArea.style.display = "none"
      statusArea.className = "status warn"
      statusArea.textContent = "Consultando seu pedido..."

      if (!pedido || !email) {
        statusArea.className = "status error"
        statusArea.textContent = "Link inválido. Pedido ou email não encontrados."
        return
      }

      try {
        const res = await fetch(
          API_URL + "/pedido-status?pedido=" + encodeURIComponent(pedido) + "&email=" + encodeURIComponent(email)
        )

        const dados = await res.json()

        if (!res.ok) {
          statusArea.className = "status error"
          statusArea.textContent = dados.erro || "Erro ao consultar pedido."
          return
        }

        if (dados.entrega) {
          statusArea.className = "status ok"
          statusArea.textContent = "Pagamento confirmado e conta entregue."

          document.getElementById("produtoNome").textContent = dados.pedido.produto_nome || "-"
          document.getElementById("loginConta").textContent = dados.entrega.login || "-"
          document.getElementById("senhaConta").textContent = dados.entrega.senha || "-"

          entregaArea.style.display = "block"
          return
        }

        const statusPagamento = String(
          dados?.pedido?.payment_status || dados?.pedido?.status || ""
        ).toLowerCase()

        if (["paid", "approved"].includes(statusPagamento)) {
          statusArea.className = "status warn"
          statusArea.textContent = "Pagamento confirmado. Estamos preparando a entrega."
          return
        }

        if (["pending", "in_process"].includes(statusPagamento)) {
          statusArea.className = "status warn"
          statusArea.textContent = "Seu pagamento ainda não foi confirmado. Assim que o Pix for aprovado, a conta aparecerá aqui."
          return
        }

        statusArea.className = "status warn"
        statusArea.textContent = "Seu pedido foi localizado, mas a entrega ainda não está pronta."
      } catch (error) {
        statusArea.className = "status error"
        statusArea.textContent = "Erro ao conectar com a API."
      }
    }

    consultarPedido()
  </script>
</body>
</html>
