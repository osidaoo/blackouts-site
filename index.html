<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackouts Store</title>
<style>
:root{
--bg:#02040a;
--bg2:#07111f;
--panel:rgba(10,16,30,.92);
--line:rgba(111,168,255,.18);
--text:#f5f7ff;
--muted:#aab5d6;
--primary:#4ea1ff;
--primary2:#7cc0ff;
--danger:#ff5f7a;
--ok:#3ddc97;
--radius:20px;
}
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}
body{
min-height:100vh;
background:
radial-gradient(circle at top, rgba(78,161,255,.15), transparent 30%),
linear-gradient(180deg, var(--bg), var(--bg2));
color:var(--text);
padding:24px;
}
.container{
max-width:1200px;
margin:auto;
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
flex-wrap:wrap;
gap:12px;
}
.logo{
font-size:30px;
font-weight:900;
letter-spacing:2px;
color:var(--primary2);
}
.subtitle{
color:var(--muted);
font-size:14px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:var(--radius);
padding:20px;
}
.card h3{
margin-bottom:10px;
}
.price{
font-size:20px;
font-weight:bold;
color:var(--primary2);
margin-bottom:14px;
}
.stock{
font-size:13px;
color:var(--muted);
margin-bottom:14px;
}
.btn{
border:none;
border-radius:12px;
padding:12px;
width:100%;
cursor:pointer;
font-weight:700;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:#00152f;
}
.btn:hover{
opacity:.9;
}
.loading{
color:var(--muted);
}
.footer{
margin-top:50px;
text-align:center;
color:var(--muted);
font-size:13px;
}
.modal-bg{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}
.modal{
width:100%;
max-width:520px;
background:var(--panel);
border:1px solid var(--line);
border-radius:24px;
padding:24px;
}
.modal h3{
margin-bottom:16px;
}
input{
width:100%;
padding:14px 16px;
border-radius:14px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.04);
color:#fff;
outline:none;
margin-bottom:14px;
font-size:15px;
}
.status{
margin-top:10px;
padding:12px 14px;
border-radius:14px;
font-size:14px;
display:none;
white-space:pre-wrap;
}
.status.ok{
display:block;
background:rgba(61,220,151,.1);
color:#bdf5dc;
border:1px solid rgba(61,220,151,.2);
}
.status.error{
display:block;
background:rgba(255,95,122,.1);
color:#ffd6de;
border:1px solid rgba(255,95,122,.2);
}
.btn-row{
display:flex;
gap:10px;
margin-top:10px;
}
.btn-secondary{
background:rgba(255,255,255,.08);
color:#fff;
border:1px solid rgba(255,255,255,.12);
}
.pix-box{
margin-top:16px;
padding:16px;
border-radius:16px;
background:rgba(78,161,255,.08);
border:1px solid rgba(78,161,255,.18);
display:none;
}
.pix-box img{
width:220px;
max-width:100%;
display:block;
margin:12px auto;
background:#fff;
padding:8px;
border-radius:12px;
}
.pix-code{
width:100%;
min-height:120px;
padding:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.04);
color:#fff;
margin-top:10px;
}
.copy-btn{
margin-top:10px;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <div class="logo">BLACKOUTS</div>
      <div class="subtitle">Loja oficial</div>
    </div>
  </div>

  <h2 style="margin-bottom:20px;">Produtos disponíveis</h2>

  <div id="produtos" class="grid">
    <div class="loading">Carregando produtos...</div>
  </div>

  <div class="footer">
    Blackouts © 2026
  </div>
</div>

<div id="modalBg" class="modal-bg">
  <div class="modal">
    <h3>Finalizar pedido com Pix</h3>

    <input type="hidden" id="produtoIdPedido">

    <input id="nomeCliente" type="text" placeholder="Seu nome">
    <input id="emailCliente" type="email" placeholder="Seu e-mail">

    <div class="btn-row">
      <button class="btn" onclick="enviarPedido()">Gerar Pix</button>
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
    </div>

    <div id="pedidoStatus" class="status"></div>

    <div id="pixBox" class="pix-box">
      <strong>Pagamento Pix gerado</strong>
      <img id="pixQrImage" alt="QR Code Pix">
      <div style="margin-top:10px;">Copia e cola Pix:</div>
      <textarea id="pixCode" class="pix-code" readonly></textarea>
      <button class="btn copy-btn" onclick="copiarPix()">Copiar código Pix</button>
      <div style="margin-top:12px; color:#aab5d6; font-size:13px;">
        A conta será liberada somente após confirmação do pagamento.
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://blackouts-site.onrender.com"

async function carregarProdutos(){
  const container = document.getElementById("produtos")

  try{
    const res = await fetch(API_URL + "/produtos")
    const produtos = await res.json()

    if(!produtos.length){
      container.innerHTML = "Nenhum produto disponível."
      return
    }

    let html = ""

    produtos.forEach(produto => {
      html += `
        <div class="card">
          <h3>${produto.nome}</h3>
          <div class="price">R$ ${Number(produto.preco).toFixed(2)}</div>
          <div class="stock">Estoque: ${produto.estoque}</div>
          <button class="btn" onclick="abrirModal(${produto.id})">Comprar</button>
        </div>
      `
    })

    container.innerHTML = html
  }catch(e){
    container.innerHTML = "Erro ao carregar produtos"
  }
}

function abrirModal(produtoId){
  document.getElementById("produtoIdPedido").value = produtoId
  document.getElementById("modalBg").style.display = "flex"
  limparStatusPedido()
  document.getElementById("pixBox").style.display = "none"
  document.getElementById("pixQrImage").src = ""
  document.getElementById("pixCode").value = ""
}

function fecharModal(){
  document.getElementById("modalBg").style.display = "none"
  document.getElementById("produtoIdPedido").value = ""
  document.getElementById("nomeCliente").value = ""
  document.getElementById("emailCliente").value = ""
  limparStatusPedido()
  document.getElementById("pixBox").style.display = "none"
  document.getElementById("pixQrImage").src = ""
  document.getElementById("pixCode").value = ""
}

function mostrarStatusPedido(texto, tipo){
  const el = document.getElementById("pedidoStatus")
  el.className = "status " + tipo
  el.textContent = texto
}

function limparStatusPedido(){
  const el = document.getElementById("pedidoStatus")
  el.className = "status"
  el.textContent = ""
}

async function enviarPedido(){
  const produto_id = Number(document.getElementById("produtoIdPedido").value)
  const nome_cliente = document.getElementById("nomeCliente").value.trim()
  const email_cliente = document.getElementById("emailCliente").value.trim()

  if(!produto_id || !nome_cliente || !email_cliente){
    mostrarStatusPedido("Preencha nome e email.", "error")
    return
  }

  try{
    const res = await fetch(API_URL + "/pedidos", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        produto_id,
        nome_cliente,
        email_cliente
      })
    })

    const dados = await res.json()

    if(!res.ok){
      mostrarStatusPedido(dados.erro || "Erro ao gerar pedido Pix.", "error")
      return
    }

    mostrarStatusPedido("Pix gerado com sucesso. Faça o pagamento para liberar a conta.", "ok")

    if(dados.pix){
      if(dados.pix.qr_code_base64){
        document.getElementById("pixQrImage").src = "data:image/png;base64," + dados.pix.qr_code_base64
      }

      document.getElementById("pixCode").value = dados.pix.qr_code || ""
      document.getElementById("pixBox").style.display = "block"
    }

  }catch(e){
    mostrarStatusPedido("Erro ao conectar com a API.", "error")
  }
}

async function copiarPix(){
  const texto = document.getElementById("pixCode").value

  if(!texto){
    return
  }

  try{
    await navigator.clipboard.writeText(texto)
    alert("Código Pix copiado.")
  }catch(e){
    alert("Não foi possível copiar o código.")
  }
}

carregarProdutos()
</script>

</body>
</html>
