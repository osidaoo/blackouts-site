<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blackouts Store</title>

<style>

:root{
--bg:#02040a;
--bg2:#07111f;
--panel:rgba(10,16,30,.92);
--line:rgba(111,168,255,.18);
--text:#f5f7ff;
--muted:#aab5d6;
--primary:#4ea1ff;
--primary2:#7cc0ff;
--radius:20px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top, rgba(78,161,255,.15), transparent 30%),
linear-gradient(180deg, var(--bg), var(--bg2));
color:var(--text);
padding:24px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
flex-wrap:wrap;
gap:12px;
}

.logo{
font-size:30px;
font-weight:900;
letter-spacing:2px;
color:var(--primary2);
}

.subtitle{
color:var(--muted);
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:var(--radius);
padding:20px;
}

.card h3{
margin-bottom:10px;
}

.price{
font-size:20px;
font-weight:bold;
color:var(--primary2);
margin-bottom:14px;
}

.stock{
font-size:13px;
color:var(--muted);
margin-bottom:14px;
}

.btn{
border:none;
border-radius:12px;
padding:12px;
width:100%;
cursor:pointer;
font-weight:700;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:#00152f;
}

.btn:hover{
opacity:.9;
}

.loading{
color:var(--muted);
}

.footer{
margin-top:50px;
text-align:center;
color:var(--muted);
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div>
<div class="logo">BLACKOUTS</div>
<div class="subtitle">Loja oficial</div>
</div>
</div>

<h2 style="margin-bottom:20px;">Produtos disponíveis</h2>

<div id="produtos" class="grid">
<div class="loading">Carregando produtos...</div>
</div>

<div class="footer">
Blackouts © 2026
</div>

</div>

<script>

const API_URL = "https://blackouts-site.onrender.com"

async function carregarProdutos(){

const container = document.getElementById("produtos")

try{

const res = await fetch(API_URL + "/produtos")

const produtos = await res.json()

if(!produtos.length){
container.innerHTML = "Nenhum produto disponível."
return
}

let html = ""

produtos.forEach(produto => {

html += `
<div class="card">

<h3>${produto.nome}</h3>

<div class="price">
R$ ${Number(produto.preco).toFixed(2)}
</div>

<div class="stock">
Estoque: ${produto.estoque}
</div>

<button class="btn" onclick="comprar(${produto.id})">
Comprar
</button>

</div>
`

})

container.innerHTML = html

}catch(e){

container.innerHTML = "Erro ao carregar produtos"

}

}

function comprar(id){

alert("Compra do produto "+id+" será implementada no próximo passo.")

}

carregarProdutos()

</script>

</body>
</html>
