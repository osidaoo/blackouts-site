<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackouts Admin</title>
  <style>
    :root{
      --bg:#02040a;
      --bg2:#07111f;
      --panel:rgba(10,16,30,.88);
      --line:rgba(111,168,255,.18);
      --text:#f5f7ff;
      --muted:#aab5d6;
      --primary:#4ea1ff;
      --primary2:#7cc0ff;
      --danger:#ff5f7a;
      --ok:#3ddc97;
      --shadow:0 24px 60px rgba(0,0,0,.45);
      --radius:20px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(78,161,255,.15), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color:var(--text);
      padding:24px;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:24px;
      flex-wrap:wrap;
    }

    .brand{
      font-size:28px;
      font-weight:900;
      letter-spacing:2px;
      color:var(--primary2);
    }

    .subtitle{
      color:var(--muted);
      margin-top:6px;
      font-size:14px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
      margin-bottom:20px;
      backdrop-filter:blur(10px);
    }

    h2{
      margin-bottom:18px;
      font-size:22px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    @media (max-width: 900px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    label{
      display:block;
      margin-bottom:8px;
      color:var(--muted);
      font-size:14px;
    }

    input{
      width:100%;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:#fff;
      outline:none;
      margin-bottom:14px;
      font-size:15px;
    }

    input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(78,161,255,.15);
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      cursor:pointer;
      font-weight:700;
      transition:.2s;
      font-size:15px;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:.95;
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--primary), var(--primary2));
      color:#00152f;
    }

    .btn-secondary{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .btn-danger{
      background:rgba(255,95,122,.16);
      color:#ffd6de;
      border:1px solid rgba(255,95,122,.25);
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      display:none;
    }

    .status.ok{
      display:block;
      background:rgba(61,220,151,.1);
      color:#bdf5dc;
      border:1px solid rgba(61,220,151,.2);
    }

    .status.error{
      display:block;
      background:rgba(255,95,122,.1);
      color:#ffd6de;
      border:1px solid rgba(255,95,122,.2);
    }

    .hidden{
      display:none;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:16px;
    }

    th, td{
      text-align:left;
      padding:14px 12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      font-size:14px;
    }

    th{
      color:var(--primary2);
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.6px;
    }

    .produto-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .small{
      padding:10px 12px;
      font-size:13px;
      border-radius:10px;
    }

    .welcome{
      color:var(--muted);
      font-size:14px;
    }

    .empty{
      color:var(--muted);
      padding:14px 0 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <div class="brand">BLACKOUTS ADMIN</div>
        <div class="subtitle">Painel de controle de produtos</div>
      </div>

      <div class="btn-row">
        <button id="btnLogoutTop" class="btn btn-danger hidden">Sair</button>
      </div>
    </div>

    <div id="loginCard" class="card">
      <h2>Login do administrador</h2>

      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="Digite seu e-mail" />

      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Digite sua senha" />

      <button id="btnLogin" class="btn btn-primary">Entrar no painel</button>

      <div id="loginStatus" class="status"></div>
    </div>

    <div id="adminArea" class="hidden">
      <div class="grid">
        <div class="card">
          <h2>Cadastrar / editar produto</h2>

          <input id="produtoId" type="hidden" />

          <label for="nomeProduto">Nome do produto</label>
          <input id="nomeProduto" type="text" placeholder="Ex: Conta Premium" />

          <label for="precoProduto">Preço</label>
          <input id="precoProduto" type="number" step="0.01" placeholder="Ex: 29.90" />

          <label for="estoqueProduto">Estoque</label>
          <input id="estoqueProduto" type="number" placeholder="Ex: 10" />

          <div class="btn-row">
            <button id="btnSalvarProduto" class="btn btn-primary">Salvar produto</button>
            <button id="btnCancelarEdicao" class="btn btn-secondary">Cancelar edição</button>
          </div>

          <div id="produtoStatus" class="status"></div>
        </div>

        <div class="card">
          <h2>Informações da sessão</h2>
          <p class="welcome" id="welcomeText">Você ainda não está logado.</p>
        </div>
      </div>

      <div class="card">
        <div class="topbar" style="margin-bottom:0;">
          <div>
            <h2 style="margin-bottom:6px;">Lista de produtos</h2>
            <div class="subtitle">Gerencie seus produtos por aqui</div>
          </div>
          <div class="btn-row">
            <button id="btnAtualizar" class="btn btn-secondary">Atualizar lista</button>
          </div>
        </div>

        <div id="produtosWrap">
          <div class="empty">Carregando produtos...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://blackouts-site.onrender.com"

    const loginCard = document.getElementById("loginCard")
    const adminArea = document.getElementById("adminArea")
    const btnLogin = document.getElementById("btnLogin")
    const btnLogoutTop = document.getElementById("btnLogoutTop")
    const btnSalvarProduto = document.getElementById("btnSalvarProduto")
    const btnCancelarEdicao = document.getElementById("btnCancelarEdicao")
    const btnAtualizar = document.getElementById("btnAtualizar")

    const loginStatus = document.getElementById("loginStatus")
    const produtoStatus = document.getElementById("produtoStatus")
    const produtosWrap = document.getElementById("produtosWrap")
    const welcomeText = document.getElementById("welcomeText")

    const emailInput = document.getElementById("email")
    const senhaInput = document.getElementById("senha")

    const produtoIdInput = document.getElementById("produtoId")
    const nomeProdutoInput = document.getElementById("nomeProduto")
    const precoProdutoInput = document.getElementById("precoProduto")
    const estoqueProdutoInput = document.getElementById("estoqueProduto")

    function mostrarStatus(el, texto, tipo) {
      el.className = "status " + tipo
      el.textContent = texto
    }

    function limparStatus(el) {
      el.className = "status"
      el.textContent = ""
    }

    function getToken() {
      return localStorage.getItem("blackouts_admin_token")
    }

    function getUsuario() {
      const raw = localStorage.getItem("blackouts_admin_user")
      return raw ? JSON.parse(raw) : null
    }

    function salvarSessao(token, usuario) {
      localStorage.setItem("blackouts_admin_token", token)
      localStorage.setItem("blackouts_admin_user", JSON.stringify(usuario))
    }

    function limparSessao() {
      localStorage.removeItem("blackouts_admin_token")
      localStorage.removeItem("blackouts_admin_user")
    }

    function mostrarTelaAdmin() {
      const usuario = getUsuario()
      loginCard.classList.add("hidden")
      adminArea.classList.remove("hidden")
      btnLogoutTop.classList.remove("hidden")
      welcomeText.textContent = "Logado como: " + (usuario?.nome || "Administrador") + " | Papel: " + (usuario?.papel || "admin")
    }

    function mostrarTelaLogin() {
      adminArea.classList.add("hidden")
      loginCard.classList.remove("hidden")
      btnLogoutTop.classList.add("hidden")
      welcomeText.textContent = "Você ainda não está logado."
    }

    function limparFormularioProduto() {
      produtoIdInput.value = ""
      nomeProdutoInput.value = ""
      precoProdutoInput.value = ""
      estoqueProdutoInput.value = ""
    }

    async function login() {
      limparStatus(loginStatus)

      const email = emailInput.value.trim()
      const senha = senhaInput.value.trim()

      if (!email || !senha) {
        mostrarStatus(loginStatus, "Preencha email e senha.", "error")
        return
      }

      try {
        const resposta = await fetch(API_URL + "/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, senha })
        })

        const dados = await resposta.json()

        if (!resposta.ok) {
          mostrarStatus(loginStatus, dados.erro || "Erro no login.", "error")
          return
        }

        if (dados.usuario.papel !== "admin") {
          mostrarStatus(loginStatus, "Esse usuário não é admin.", "error")
          return
        }

        salvarSessao(dados.token, dados.usuario)
        mostrarStatus(loginStatus, "Login realizado com sucesso.", "ok")

        mostrarTelaAdmin()
        carregarProdutos()
      } catch (error) {
        mostrarStatus(loginStatus, "Erro ao conectar com a API.", "error")
      }
    }

    async function verificarSessao() {
      const token = getToken()

      if (!token) {
        mostrarTelaLogin()
        return
      }

      try {
        const resposta = await fetch(API_URL + "/me", {
          headers: {
            Authorization: "Bearer " + token
          }
        })

        const dados = await resposta.json()

        if (!resposta.ok || !dados.usuario) {
          limparSessao()
          mostrarTelaLogin()
          return
        }

        if (dados.usuario.papel !== "admin") {
          limparSessao()
          mostrarTelaLogin()
          return
        }

        mostrarTelaAdmin()
        carregarProdutos()
      } catch (error) {
        limparSessao()
        mostrarTelaLogin()
      }
    }

    async function carregarProdutos() {
      produtosWrap.innerHTML = '<div class="empty">Carregando produtos...</div>'

      try {
        const resposta = await fetch(API_URL + "/admin/produtos", {
          headers: {
            Authorization: "Bearer " + getToken()
          }
        })

        const dados = await resposta.json()

        if (!resposta.ok) {
          produtosWrap.innerHTML = '<div class="empty">Erro ao carregar produtos.</div>'
          return
        }

        if (!dados.length) {
          produtosWrap.innerHTML = '<div class="empty">Nenhum produto cadastrado ainda.</div>'
          return
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody>
        `

        for (const produto of dados) {
          html += `
            <tr>
              <td>${produto.id}</td>
              <td>${produto.nome ?? ""}</td>
              <td>R$ ${Number(produto.preco ?? 0).toFixed(2)}</td>
              <td>${produto.estoque ?? 0}</td>
              <td>
                <div class="produto-actions">
                  <button class="btn btn-secondary small" onclick='editarProduto(${JSON.stringify(produto).replace(/'/g, "&apos;")})'>Editar</button>
                  <button class="btn btn-danger small" onclick="deletarProduto(${produto.id})">Excluir</button>
                </div>
              </td>
            </tr>
          `
        }

        html += `
            </tbody>
          </table>
        `

        produtosWrap.innerHTML = html
      } catch (error) {
        produtosWrap.innerHTML = '<div class="empty">Erro ao conectar com a API.</div>'
      }
    }

    function editarProduto(produto) {
      produtoIdInput.value = produto.id
      nomeProdutoInput.value = produto.nome ?? ""
      precoProdutoInput.value = produto.preco ?? ""
      estoqueProdutoInput.value = produto.estoque ?? ""
      mostrarStatus(produtoStatus, "Modo edição ativado para o produto ID " + produto.id, "ok")
      window.scrollTo({ top: 0, behavior: "smooth" })
    }

    async function salvarProduto() {
      limparStatus(produtoStatus)

      const id = produtoIdInput.value.trim()
      const nome = nomeProdutoInput.value.trim()
      const preco = precoProdutoInput.value.trim()
      const estoque = estoqueProdutoInput.value.trim()

      if (!nome || preco === "" || estoque === "") {
        mostrarStatus(produtoStatus, "Preencha nome, preço e estoque.", "error")
        return
      }

      const payload = {
        nome,
        preco: Number(preco),
        estoque: Number(estoque)
      }

      const url = id
        ? API_URL + "/admin/produtos/" + id
        : API_URL + "/admin/produtos"

      const method = id ? "PUT" : "POST"

      try {
        const resposta = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + getToken()
          },
          body: JSON.stringify(payload)
        })

        const dados = await resposta.json()

        if (!resposta.ok) {
          mostrarStatus(produtoStatus, dados.erro || "Erro ao salvar produto.", "error")
          return
        }

        mostrarStatus(produtoStatus, id ? "Produto atualizado com sucesso." : "Produto criado com sucesso.", "ok")
        limparFormularioProduto()
        carregarProdutos()
      } catch (error) {
        mostrarStatus(produtoStatus, "Erro ao conectar com a API.", "error")
      }
    }

    async function deletarProduto(id) {
      const confirmar = confirm("Tem certeza que deseja excluir este produto?")

      if (!confirmar) {
        return
      }

      try {
        const resposta = await fetch(API_URL + "/admin/produtos/" + id, {
          method: "DELETE",
          headers: {
            Authorization: "Bearer " + getToken()
          }
        })

        const dados = await resposta.json()

        if (!resposta.ok) {
          alert(dados.erro || "Erro ao excluir produto.")
          return
        }

        alert("Produto excluído com sucesso.")
        carregarProdutos()
      } catch (error) {
        alert("Erro ao conectar com a API.")
      }
    }

    function logout() {
      limparSessao()
      mostrarTelaLogin()
      limparFormularioProduto()
      limparStatus(loginStatus)
      limparStatus(produtoStatus)
      produtosWrap.innerHTML = ""
    }

    btnLogin.addEventListener("click", login)
    btnSalvarProduto.addEventListener("click", salvarProduto)
    btnCancelarEdicao.addEventListener("click", () => {
      limparFormularioProduto()
      limparStatus(produtoStatus)
    })
    btnAtualizar.addEventListener("click", carregarProdutos)
    btnLogoutTop.addEventListener("click", logout)

    verificarSessao()
  </script>
</body>
</html>
