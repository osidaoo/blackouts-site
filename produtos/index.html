<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<title>Blackouts | Produtos</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap");

:root{
  --bg:#02040a;
  --bg2:#060914;
  --panel:rgba(8,12,20,.72);
  --panel-strong:rgba(8,12,20,.86);
  --line:rgba(59,130,246,.28);
  --text:#f5f7ff;
  --muted:#9aa8cc;
  --primary:#3b82f6;
  --primary2:#63b3ff;
  --radius:16px;
  --glow:0 0 18px rgba(59,130,246,.35);
  --transition:0.25s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  font-family:"Inter", system-ui, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 10%, rgba(59,130,246,.18), transparent 32%),
    radial-gradient(circle at 80% 15%, rgba(59,130,246,.12), transparent 38%),
    linear-gradient(180deg, var(--bg), var(--bg2));
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
  background-size:140px 140px, 220px 220px;
  background-position:0 0, 60px 80px;
  opacity:.25;
  pointer-events:none;
}
.page{position:relative;z-index:1;}
.container{
  max-width:1200px;
  margin:0 auto;
  padding:28px 24px 60px;
}

.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 24px;
  border-radius:999px;
  background:rgba(5,8,16,.55);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(12px);
  position:sticky;
  top:16px;
  z-index:10;
}
.brand{
  font-weight:800;
  letter-spacing:.22em;
  color:#9dd0ff;
  text-decoration:none;
  position:relative;
}
.brand::before,
.brand::after{
  content:"";
  position:absolute;
  top:50%;
  width:70px;
  height:2px;
  background:linear-gradient(90deg, transparent, rgba(59,130,246,.9), transparent);
  box-shadow:0 0 12px rgba(59,130,246,.6);
}
.brand::before{right:100%;margin-right:16px;}
.brand::after{left:100%;margin-left:16px;}
.nav-links{display:flex;gap:18px;font-size:14px;}
.nav-links a{color:var(--muted);text-decoration:none;transition:color var(--transition);}
.nav-links a:hover{color:#dce6ff;}

.section{margin-top:50px;text-align:center;}
.section h1{font-size:34px;margin-bottom:10px;}
.section p{color:var(--muted);}

.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-top:28px;
}
.product-card{
  background:var(--panel-strong);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);
  padding:18px;
  text-align:left;
  transition:transform var(--transition), box-shadow var(--transition);
}
.product-card:hover{transform:translateY(-6px);box-shadow:var(--glow);}
.product-thumb{
  height:140px;
  border-radius:14px;
  background:linear-gradient(135deg, rgba(59,130,246,.28), rgba(10,14,24,.6));
  margin-bottom:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#d7e7ff;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  background-size:cover;
  background-position:center;
}
.product-card h3{margin-bottom:8px;font-size:18px;}
.price{font-size:20px;font-weight:700;color:#a8d2ff;margin-bottom:10px;}
.product-meta{color:var(--muted);font-size:13px;margin-bottom:10px;}
.stock{color:var(--muted);font-size:13px;margin-bottom:14px;}

.btn{
  border:none;
  border-radius:999px;
  padding:12px 18px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  transition:transform var(--transition), box-shadow var(--transition), background var(--transition);
}
.btn-primary{
  background:linear-gradient(135deg, var(--primary), var(--primary2));
  color:#051026;
  box-shadow:0 12px 26px rgba(59,130,246,.35);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 32px rgba(59,130,246,.45);}

.footer{
  margin-top:50px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

@media (max-width: 900px){
  .nav{flex-direction:column;gap:12px;}
}
.filters{
  margin-top:20px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:flex-end;
  justify-content:center;
}
.filter-group{
  min-width:220px;
}
.filters input{
  margin-bottom:0;
}
.btn-ghost{
  background:rgba(255,255,255,.06);
  color:#dfe8ff;
  border:1px solid rgba(255,255,255,.14);
}
.btn-ghost:hover{transform:translateY(-2px);box-shadow:var(--glow);}
.product-desc{
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
  margin-bottom:12px;
  min-height:38px;
}
.price-line{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}
.price-old{
  color:var(--muted);
  font-size:13px;
  text-decoration:line-through;
}
.price-current{
  font-size:20px;
  font-weight:700;
  color:#a8d2ff;
}
.product-card.disabled{
  opacity:.55;
}
.stock.soldout{
  color:#ff9aa6;
  font-weight:600;
}
.btn:disabled,
.btn[disabled]{
  cursor:not-allowed;
  opacity:.6;
  box-shadow:none;
  transform:none;
}</style>
</head>
<body>
<div class="page">
  <div class="container">
    <header class="nav">
      <a class="brand" href="../">BLACKOUTS</a>
      <div class="nav-links">
        <a href="../">Inicio</a>
        <a href="../#suporte">Suporte</a>
      </div>
      <a class="btn btn-primary" href="../entrar/">Entrar</a>
    </header>

    <section class="section">
      <h1>Produtos</h1>
      <p>Escolha o produto e finalize a compra com Pix.</p>

            <div class="filters">
        <div class="filter-group">
          <label for="categoriaFiltro">Categoria</label>
          <select id="categoriaFiltro">
            <option value="">Todas</option>
            <option value="games">Games</option>
            <option value="assinaturas">Assinaturas</option>
            <option value="steam keys">Steam Keys</option>
            <option value="ia">IA's</option>
            <option value="outros">Outros</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="buscaFiltro">Buscar</label>
          <input id="buscaFiltro" type="text" placeholder="Nome ou descricao" />
        </div>
        <button class="btn btn-ghost" id="limparFiltro">Limpar filtro</button>
      </div>
<div id="produtos" class="products-grid">
        <div>Carregando produtos...</div>
      </div>
    </section>

    <div class="footer">© Blackouts — loja digital com identidade premium</div>
  </div>
</div>

<script src="../config.js"></script>
<script>
const CONFIG = window.__CONFIG__ || {}
const API_URL = CONFIG.API_URL || "https://blackouts-site.onrender.com"

const produtosContainer = document.getElementById("produtos")
const categoriaSelect = document.getElementById("categoriaFiltro")
const buscaInput = document.getElementById("buscaFiltro")
const limparFiltroBtn = document.getElementById("limparFiltro")
let produtosCache = []

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  })
}

function normalizarImagem(url) {
  const raw = String(url || "").trim()
  if (!raw) return ""
  return raw.replace(/"/g, "&quot;")
}

function resumirTexto(texto, limite) {
  const valor = String(texto || "").trim()
  if (!valor) return "Entrega automática via Pix"
  if (valor.length <= limite) return valor
  return valor.slice(0, limite).trim() + "..."
}

function obterPrecoFinal(produto) {
  const preco = Number(produto.preco ?? produto.price ?? 0)
  const promo = Number(produto.preco_promocional ?? 0)
  if (promo && !Number.isNaN(promo) && promo > 0 && promo < preco) {
    return { preco, promo, final: promo }
  }
  return { preco, promo: null, final: preco }
}

function montarCardProduto(produto) {
  const nome = produto.nome ?? produto.name ?? "Produto"
  const descricao = resumirTexto(produto.descricao ?? produto.description, 100)
  const estoque = Number(produto.stock_available ?? produto.estoque ?? 0)
  const ativo = produto.ativo !== undefined ? Boolean(produto.ativo) : true
  const imagem = normalizarImagem(produto.banner_url ?? produto.image_url ?? produto.image)
  const letra = nome ? nome.charAt(0).toUpperCase() : "B"
  const thumbStyle = imagem ? `style="background-image:url('${imagem}')"` : ""
  const { preco, promo, final } = obterPrecoFinal(produto)
  const indisponivel = !ativo || estoque <= 0

  return `
    <div class="product-card ${indisponivel ? "disabled" : ""}">
      <div class="product-thumb" ${thumbStyle}>${imagem ? "" : letra}</div>
      <h3>${nome}</h3>
      <div class="product-desc">${descricao}</div>
      <div class="price-line">
        ${promo ? `<span class="price-old">${formatarMoeda(preco)}</span>` : ""}
        <span class="price-current">${formatarMoeda(final)}</span>
      </div>
      <div class="stock ${indisponivel ? "soldout" : ""}">
        ${indisponivel ? "Indisponível" : `Estoque: ${estoque}`}
      </div>
      ${indisponivel
        ? '<button class="btn btn-ghost" disabled>Indisponível</button>'
        : `<button class="btn btn-primary" onclick="irParaCheckout(${produto.id})">Comprar</button>`
      }
    </div>
  `
}

function renderProdutos(lista) {
  if (!Array.isArray(lista) || !lista.length) {
    produtosContainer.innerHTML = "Nenhum produto encontrado."
    return
  }

  produtosContainer.innerHTML = lista.map(montarCardProduto).join("")
}

function atualizarUrlFiltros() {
  const url = new URL(window.location.href)
  const categoria = categoriaSelect?.value || ""
  const termo = buscaInput?.value?.trim() || ""

  if (categoria) {
    url.searchParams.set("categoria", categoria)
  } else {
    url.searchParams.delete("categoria")
  }

  if (termo) {
    url.searchParams.set("q", termo)
  } else {
    url.searchParams.delete("q")
  }

  window.history.replaceState({}, "", url)
}

function aplicarFiltroTexto(lista, termo) {
  const valor = String(termo || "").trim().toLowerCase()
  if (!valor) return lista

  return (lista || []).filter((produto) => {
    const nome = String(produto?.nome ?? produto?.name ?? "").toLowerCase()
    const descricao = String(produto?.descricao ?? produto?.description ?? "").toLowerCase()
    return nome.includes(valor) || descricao.includes(valor)
  })
}

function aplicarFiltrosLocais() {
  const termo = buscaInput?.value || ""
  const filtrados = aplicarFiltroTexto(produtosCache, termo)
  renderProdutos(filtrados)
}

async function carregarProdutos() {
  const categoria = categoriaSelect?.value || ""

  try {
    let url = API_URL + "/produtos"
    if (categoria) {
      url += "?categoria=" + encodeURIComponent(categoria)
    }

    const res = await fetch(url)
    const produtos = await res.json()
    produtosCache = Array.isArray(produtos) ? produtos : []
    aplicarFiltrosLocais()
  } catch (error) {
    produtosContainer.innerHTML = "Erro ao carregar produtos"
  }
}

function irParaCheckout(produtoId) {
  window.location.href = "../checkout/?produto=" + encodeURIComponent(produtoId)
}

if (categoriaSelect) {
  const params = new URLSearchParams(window.location.search)
  const categoriaParam = params.get("categoria")
  const buscaParam = params.get("q")
  if (categoriaParam) {
    categoriaSelect.value = categoriaParam
  }
  if (buscaParam && buscaInput) {
    buscaInput.value = buscaParam
  }

  categoriaSelect.addEventListener("change", () => {
    atualizarUrlFiltros()
    carregarProdutos()
  })
}

if (buscaInput) {
  buscaInput.addEventListener("input", () => {
    atualizarUrlFiltros()
    aplicarFiltrosLocais()
  })
}

if (limparFiltroBtn) {
  limparFiltroBtn.addEventListener("click", () => {
    if (categoriaSelect) {
      categoriaSelect.value = ""
    }
    if (buscaInput) {
      buscaInput.value = ""
    }
    atualizarUrlFiltros()
    carregarProdutos()
  })
}

carregarProdutos()

</script>
</body>
</html>
