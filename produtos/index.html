<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<title>Blackouts | Produtos</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap");

:root{
  --bg:#02040a;
  --bg2:#060914;
  --panel:rgba(8,12,20,.72);
  --panel-strong:rgba(8,12,20,.86);
  --line:rgba(59,130,246,.28);
  --text:#f5f7ff;
  --muted:#9aa8cc;
  --primary:#3b82f6;
  --primary2:#63b3ff;
  --radius:16px;
  --glow:0 0 18px rgba(59,130,246,.35);
  --transition:0.25s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  font-family:"Inter", system-ui, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 10%, rgba(59,130,246,.18), transparent 32%),
    radial-gradient(circle at 80% 15%, rgba(59,130,246,.12), transparent 38%),
    linear-gradient(180deg, var(--bg), var(--bg2));
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
  background-size:140px 140px, 220px 220px;
  background-position:0 0, 60px 80px;
  opacity:.25;
  pointer-events:none;
}
.page{position:relative;z-index:1;}
.container{
  max-width:1200px;
  margin:0 auto;
  padding:28px 24px 60px;
}

.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 24px;
  border-radius:999px;
  background:rgba(5,8,16,.55);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(12px);
  position:sticky;
  top:16px;
  z-index:10;
}
.brand{
  font-weight:800;
  letter-spacing:.22em;
  color:#9dd0ff;
  text-decoration:none;
  position:relative;
}
.brand::before,
.brand::after{
  content:"";
  position:absolute;
  top:50%;
  width:70px;
  height:2px;
  background:linear-gradient(90deg, transparent, rgba(59,130,246,.9), transparent);
  box-shadow:0 0 12px rgba(59,130,246,.6);
}
.brand::before{right:100%;margin-right:16px;}
.brand::after{left:100%;margin-left:16px;}
.nav-links{display:flex;gap:18px;font-size:14px;}
.nav-links a{color:var(--muted);text-decoration:none;transition:color var(--transition);}
.nav-links a:hover{color:#dce6ff;}

.section{margin-top:50px;text-align:center;}
.section h1{font-size:34px;margin-bottom:10px;}
.section p{color:var(--muted);}

.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-top:28px;
}
.product-card{
  background:var(--panel-strong);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);
  padding:18px;
  text-align:left;
  transition:transform var(--transition), box-shadow var(--transition);
}
.product-card:hover{transform:translateY(-6px);box-shadow:var(--glow);}
.product-thumb{
  height:140px;
  border-radius:14px;
  background:linear-gradient(135deg, rgba(59,130,246,.28), rgba(10,14,24,.6));
  margin-bottom:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#d7e7ff;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  background-size:cover;
  background-position:center;
}
.product-card h3{margin-bottom:8px;font-size:18px;}
.price{font-size:20px;font-weight:700;color:#a8d2ff;margin-bottom:10px;}
.product-meta{color:var(--muted);font-size:13px;margin-bottom:10px;}
.stock{color:var(--muted);font-size:13px;margin-bottom:14px;}

.btn{
  border:none;
  border-radius:999px;
  padding:12px 18px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  transition:transform var(--transition), box-shadow var(--transition), background var(--transition);
}
.btn-primary{
  background:linear-gradient(135deg, var(--primary), var(--primary2));
  color:#051026;
  box-shadow:0 12px 26px rgba(59,130,246,.35);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 32px rgba(59,130,246,.45);}

.footer{
  margin-top:50px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

@media (max-width: 900px){
  .nav{flex-direction:column;gap:12px;}
}
</style>
</head>
<body>
<div class="page">
  <div class="container">
    <header class="nav">
      <a class="brand" href="../">BLACKOUTS</a>
      <div class="nav-links">
        <a href="../">Inicio</a>
        <a href="../#suporte">Suporte</a>
      </div>
      <a class="btn btn-primary" href="../entrar/">Entrar</a>
    </header>

    <section class="section">
      <h1>Produtos</h1>
      <p>Escolha o produto e finalize a compra com Pix.</p>

      <div id="produtos" class="products-grid">
        <div>Carregando produtos...</div>
      </div>
    </section>

    <div class="footer">© Blackouts — loja digital com identidade premium</div>
  </div>
</div>

<script src="../config.js"></script>
<script>
const CONFIG = window.__CONFIG__ || {}
const API_URL = CONFIG.API_URL || "https://blackouts-site.onrender.com"

function normalizeImageUrl(url){
  const raw = String(url || "").trim()
  if (!raw) return ""
  return raw.replace(/"/g, "&quot;")
}

async function carregarProdutos(){
  const container = document.getElementById("produtos")

  try{
    const res = await fetch(API_URL + "/produtos")
    const produtos = await res.json()

    if(!produtos.length){
      container.innerHTML = "Nenhum produto disponivel."
      return
    }

    let html = ""

    produtos.forEach(produto => {
      const nome = produto.name ?? produto.nome ?? "-"
      const preco = Number(produto.price ?? produto.preco ?? 0)
      const estoque = produto.stock_available ?? produto.estoque ?? "-"
      const imagem = normalizeImageUrl(produto.image_url ?? produto.image ?? "")
      const letra = nome ? nome.charAt(0).toUpperCase() : "B"
      const thumbStyle = imagem ? `style="background-image:url('${imagem}')"` : ""

      html += `
        <div class="product-card">
          <div class="product-thumb" ${thumbStyle}>${imagem ? "" : letra}</div>
          <h3>${nome}</h3>
          <div class="price">R$ ${preco.toFixed(2)}</div>
          <div class="product-meta">Entrega automatica via Pix</div>
          <div class="stock">Estoque: ${estoque}</div>
          <a class="btn btn-primary" href="../checkout/?produto=${produto.id}">Comprar</a>
        </div>
      `
    })

    container.innerHTML = html
  }catch(e){
    container.innerHTML = "Erro ao carregar produtos"
  }
}

carregarProdutos()
</script>
</body>
</html>
